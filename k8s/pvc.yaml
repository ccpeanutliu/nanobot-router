apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nanobot-workspaces
  namespace: nanobot
spec:
  accessModes:
    - ReadWriteMany     # NFS / CephFS / Azure Files / EFS
  storageClassName: nfs  # change to your storage class
  resources:
    requests:
      storage: 50Gi
---
# Shared nanobot config (providers, model, etc.)
# Contains your ~/.nanobot/config.json equivalent
apiVersion: v1
kind: Secret
metadata:
  name: nanobot-config
  namespace: nanobot
type: Opaque
stringData:
  nanobot.json: |
    {
      "agents": {
        "defaults": {
          "model": "vllm/Qwen3.5-122B-A10B",
          "maxTokens": 8192,
          "contextWindowTokens": 65536,
          "maxToolIterations": 200
        }
      },
      "providers": {
        "vllm": {
          "apiBase": "http://litellm.peanutliu.cc",
          "apiKey": "mock-key",
          "extraHeaders": null
        }
      }
    }
